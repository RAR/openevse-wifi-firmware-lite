; OpenEVSE WiFi Firmware — Lite (JuiceBox / WGM160P · EFM32GG11 + WF200 via LibreTiny)
;
; Companion firmware for an Enel X JuiceBox 40: the WGM160P WiFi co-processor
; runs this build and speaks the JuiceBox $-protocol to the ATmega safety MCU.
; NOT an ESP32 target — there is no ESP-IDF here. See README.md.
;
; Envs:
;   openevse_lite — device build (LibreTiny / silabs-efm32gg11). Flash over SWD
;                   via scripts/lite_flash.sh (J-Link). Dual-OTA; 960 KB app slot.
;   native        — host doctest suites for the pure logic units (test/test_lite_*).

[platformio]
default_envs = openevse_lite

[env:native]
platform = native
framework =
test_framework = doctest
test_build_src = true
build_src_filter = -<*> +<lite/lite_random.cpp> +<lite/juicebox_proto.cpp> +<lite/lite_charge_policy.cpp> +<lite/lite_evse_properties.cpp> +<lite/lite_evse_arbitrate.cpp> +<lite/lite_session_energy.cpp> +<lite/lite_openevse_compat.cpp> +<lite/lite_clock.cpp> +<lite/lite_energy_totals.cpp> +<lite/lite_override.cpp> +<lite/lite_schedule.cpp> +<lite/lite_led.cpp> +<lite/lite_input_filter.cpp> +<lite/lite_feed.cpp> +<lite/lite_divert.cpp> +<lite/lite_shaper.cpp> +<lite/lite_provision.cpp> +<lite/lite_mqtt_policy.cpp>
build_flags = -std=gnu++17
lib_deps = bblanchon/ArduinoJson@6.20.1
extra_scripts =


[env:openevse_lite]
platform = https://github.com/RAR/libretiny.git#feature/silabs-efm32gg11-ota
board = wgm160p-juicebox-40
framework = arduino
# Flash via J-Link/SWD with the CORRECT two-image layout (bootloader@0x0 + app@0x8000).
# NEVER `program raw_firmware.elf` — its paddr-0 LOAD segment paints the ELF header over the
# bootloader at 0x0 and bricks boot (double-fault). The board's default `commander` protocol is
# an unhandled no-op in LibreTiny's builder (so `-t upload` silently did nothing); drive openocd
# instead. See scripts/lite_flash.sh.
upload_protocol = custom
upload_command = bash "$PROJECT_DIR/scripts/lite_flash.sh" "$BUILD_DIR"
# Slice-2 lite build: src/lite/ + Mongoose C core. JuiceBoxBackend replaces the
# RAPI/EvseManager stack. No FakeEVSE, no web_server/mqtt/ocpp/divert/ha/tsdb/lcd/net.
build_src_filter =
  -<*>
  +<lite/>
  -<lite/spike_main.cpp>
  -<lite/lite_evse_stubs.cpp>
  -<lite/debug_lite.cpp>
# Override all [env] inheritance — this env is entirely standalone.
# RAPI-specific libs (OpenEVSE/StreamSpy/Micro Debug) removed; JuiceBoxBackend
# needs only ArduinoJson. MicroTasks kept (lite_exclude_sources.py extra_script).
lib_deps =
  bblanchon/ArduinoJson@6.20.1
  jeremypoulter/MicroTasks@0.0.4
  knolleary/PubSubClient@^2.8
lib_ignore =
# Build-only: skip MicroTasks' un-portable, link-unneeded MicroTasksInterrupt.cpp.
extra_scripts =
  pre:scripts/lite_exclude_sources.py
build_flags =
  -D OPENEVSE_LITE
  -D JUICEBOX_40
  -D LITE_EVSE_BACKEND_JUICEBOX
  # FreeRTOS heap (heap_4 static ucHeap) — LibreTiny __wrap's ALL malloc (Arduino
  # String, ArduinoJson, lwIP pbufs) onto it, so the fork's 64 KB default starves
  # the web stack: serving the 21-26 KB gzip UI OOM'd (malloc-failed hook, then lwIP
  # refused-data heap corruption -> HardFault). 256 KB uses the idle SRAM (512 KB
  # part); links ~68.7% RAM, ~164 KB stack clearance. The fork #ifndef-guards the
  # define so this wins (libretiny feature/silabs-efm32gg11-ota 14402af).
  -D configTOTAL_HEAP_SIZE=262144
  # Loop/main-task stack. The silabs core defaults to 4 KB (#ifndef-guarded in
  # main.cpp), too small for the WebServer request path: handlers put large
  # StaticJsonDocuments on this stack (handle_scan <3072> ~3 KB, schedule <2560>,
  # status <1280>) and WebServer's handleClient() parsing adds depth above them
  # -> "stack overflow in task 'main'". 16 KB gives ample headroom; the stack is
  # carved from the (now 256 KB) FreeRTOS heap, so RAM cost is cheap.
  -D LT_MAIN_TASK_STACK_SIZE=16384
  # Lite headers (config store, backend, web, provisioning, …) on the include path.
  -I src/lite
  # LibreTiny's LT_* logging shares USART0 with the JuiceBox $-protocol line @ 115200.
  # The Atmel RX resyncs on '$' and only dispatches $-framed messages, so it IGNORES
  # non-$ log noise (the OEM WiFi fw interleaved logs with comms this way) — logging does
  # NOT corrupt the protocol (only caveat: avoid log strings containing a literal '$').
  # PRE-RELEASE DEFAULT: DEBUG + caller file:line is ON full-time while we stabilise — it
  # prints the LibreTiny startup banner on every boot (LT_LEVEL_INFO), which pairs with the
  # /status reboot_reason field to catch silent reboots. *** Revert to LT_LEVEL_NONE and
  # drop LT_LOGGER_CALLER for an actual release build (clean line, smaller flash). ***
  # Even noisier per-session: append `-DJB_DEBUG -DLT_DEBUG_LWIP=1` to PLATFORMIO_BUILD_FLAGS
  # to echo JB frames + lwIP (the appended -D LT_LOGLEVEL wins; ignore the redefine warning).
  -D LT_LOGLEVEL=LT_LEVEL_DEBUG
  -D LT_LOGGER_CALLER=1
  # The LibreTiny EFM32 family's ArduinoFamily.h omits the interrupts()/
  # noInterrupts() macros that every other family defines (beken/realtek/ln882h).
  # MicroTasksAlarm.cpp (link-needed by MicroTasks::update) uses them. Supply the
  # standard CMSIS Cortex-M PRIMASK primitives from the build env so we don't have
  # to patch the fork or the MicroTasks library. Defined object-like (no parens in
  # the flag value — LibreTiny's SCons CCFLAGS parser trips on '(' just like the
  # -include flag does): `noInterrupts()` in source expands to `__disable_irq()`.
  -D interrupts=__enable_irq
  -D noInterrupts=__disable_irq
  # WiFi creds are provisioned at runtime via softAP (no compile-time creds — see lite_provision).
  # lite_divert + lite_input_filter use floor()/exp() — link libm explicitly (bare-metal ARM
  # does not auto-link it the way a Linux host build does).
  -lm
monitor_speed = 115200
